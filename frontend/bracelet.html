<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Because — A note for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --warm-white: #FFFDF9; --ink: #1A1612;
      --muted: #8A7F74; --rose: #C4806A; --rose-light: #E8C4B8;
      --rose-pale: #F5EAE5; --gold: #B89A6A; --gold-light: #E8D9C0;
      --green: #4a7c59;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { min-height: 100vh; background: var(--cream); font-family: var(--sans); font-weight: 300; color: var(--ink); }
    .bg-glow { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(196,128,106,0.08) 0%, transparent 70%), radial-gradient(ellipse 50% 60% at 80% 80%, rgba(184,154,106,0.07) 0%, transparent 70%); pointer-events: none; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem 5rem; }
    .brand { font-family: var(--serif); font-size: 1.1rem; font-style: italic; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 2rem; text-align: center; opacity: 0; animation: fadeUp 0.6s ease 0.1s forwards; }
    .brand span { color: var(--rose); font-style: normal; }
    .tap-ring-container { position: relative; width: 70px; height: 70px; margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.6s ease 0.3s forwards; }
    .tap-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--rose-light); animation: ripple 2.5s ease-out infinite; }
    .tap-ring:nth-child(2) { animation-delay: 0.6s; }
    .tap-ring:nth-child(3) { animation-delay: 1.2s; }
    .tap-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-size: 1.1rem; color: var(--rose); }
    .note-card { width: 100%; max-width: 440px; background: var(--warm-white); border: 1px solid var(--gold-light); padding: 2.5rem; position: relative; box-shadow: 0 12px 40px rgba(26,22,18,0.08); opacity: 0; animation: cardReveal 0.9s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }
    .note-card::before, .note-card::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: var(--gold); border-style: solid; }
    .note-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .note-card::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .note-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--gold-light); }
    .note-from { display: flex; flex-direction: column; gap: 0.2rem; }
    .note-from-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .note-from-name { font-family: var(--serif); font-size: 1.1rem; }
    .note-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--rose-pale); border: 1px solid var(--rose-light); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 1.05rem; color: var(--rose); font-style: italic; }
    .note-body { margin-bottom: 1.75rem; }
    .note-text { font-family: var(--serif); font-size: clamp(1.3rem,4vw,1.65rem); font-style: italic; font-weight: 300; line-height: 1.55; }
    .note-text::before { content: '\201C'; color: var(--rose-light); font-size: 2.8rem; line-height: 0; vertical-align: -0.55rem; margin-right: 0.05em; font-style: normal; }
    .note-text::after { content: '\201D'; color: var(--rose-light); font-size: 2.8rem; line-height: 0; vertical-align: -0.55rem; margin-left: 0.05em; font-style: normal; }
    .note-footer { display: flex; align-items: center; justify-content: space-between; }
    .note-meta { display: flex; flex-direction: column; gap: 0.2rem; }
    .note-date { font-size: 0.68rem; color: var(--muted); }
    .note-bracelet { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rose); }
    .note-heart { font-size: 1.1rem; animation: heartbeat 2s ease-in-out infinite; }
    .reply-section { width: 100%; max-width: 440px; margin-top: 1.25rem; opacity: 0; animation: fadeUp 0.6s ease 1s forwards; }
    .reaction-panel { background: var(--warm-white); border: 1px solid var(--gold-light); padding: 1.5rem; }
    .reaction-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 1rem; }
    .reactions { display: flex; justify-content: center; gap: 0.75rem; }
    .reaction-btn { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; padding: 0.85rem 1.1rem; border: 1.5px solid var(--gold-light); background: transparent; cursor: pointer; transition: all 0.2s; font-family: var(--sans); flex: 1; }
    .reaction-btn:hover, .reaction-btn.selected { border-color: var(--rose); background: var(--rose-pale); }
    .reaction-emoji { font-size: 1.6rem; display: block; }
    .reaction-name { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .text-reply-panel { margin-top: 2px; background: var(--warm-white); border: 1px solid var(--gold-light); border-top: none; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease, padding 0.4s ease; padding: 0 1.5rem; }
    .text-reply-panel.visible { max-height: 220px; opacity: 1; padding: 1.5rem; }
    .text-reply-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    .text-reply-input { width: 100%; background: var(--cream); border: 1px solid var(--gold-light); padding: 0.85rem 1rem; font-family: var(--serif); font-size: 1rem; font-style: italic; color: var(--ink); resize: none; outline: none; height: 80px; transition: border-color 0.2s; }
    .text-reply-input::placeholder { color: var(--rose-light); }
    .text-reply-input:focus { border-color: var(--rose-light); }
    .reply-actions { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
    .btn-send { flex: 1; padding: 0.75rem; background: var(--ink); color: var(--warm-white); border: none; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; font-family: var(--sans); }
    .btn-send:hover { background: var(--rose); }
    .btn-skip { padding: 0.75rem 1.25rem; background: transparent; color: var(--muted); border: 1px solid var(--gold-light); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: var(--sans); }
    .btn-skip:hover { color: var(--ink); }
    .sent-confirm { display: none; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1.5rem; text-align: center; background: var(--warm-white); border: 1px solid var(--gold-light); margin-top: 2px; }
    .sent-confirm.visible { display: flex; }
    .sent-icon { font-size: 1.8rem; animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1); }
    .sent-title { font-family: var(--serif); font-size: 1.1rem; font-style: italic; }
    .sent-sub { font-size: 0.72rem; color: var(--muted); }
    .archive-strip { width: 100%; max-width: 440px; margin-top: 1.25rem; opacity: 0; animation: fadeUp 0.6s ease 1.2s forwards; }
    .archive-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; text-align: center; }
    .archive-previews { display: flex; gap: 0.75rem; }
    .archive-item { flex: 1; background: var(--warm-white); border: 1px solid var(--gold-light); padding: 0.85rem 0.9rem; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
    .archive-item:hover { border-color: var(--rose-light); transform: translateY(-2px); }
    .archive-item-from { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.3rem; }
    .archive-item-preview { font-family: var(--serif); font-size: 0.8rem; font-style: italic; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .archive-item-date { font-size: 0.58rem; color: var(--gold); margin-top: 0.4rem; }
    .loading-state, .error-state { text-align: center; padding: 3rem; }
    .loading-state p, .error-state p { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: 1.1rem; }
    .error-state h2 { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 0.75rem; }
    .bottom-brand { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); white-space: nowrap; font-family: var(--serif); font-style: italic; }
    .bottom-brand a { color: var(--rose); text-decoration: none; font-style: normal; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    @keyframes cardReveal { from{opacity:0;transform:translateY(24px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);} }
    @keyframes ripple { 0%{transform:scale(0.8);opacity:0.8;}100%{transform:scale(1.9);opacity:0;} }
    @keyframes heartbeat { 0%,100%{transform:scale(1);}15%{transform:scale(1.2);}30%{transform:scale(1);}45%{transform:scale(1.1);}60%{transform:scale(1);} }
    @keyframes popIn { from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;} }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <main class="page" id="main">
    <div class="loading-state"><p>Finding your note…</p></div>
  </main>
  <div class="bottom-brand">just <a href="/">because</a></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(JB_CONFIG.SUPABASE_URL, JB_CONFIG.SUPABASE_ANON_KEY);
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug') || JB_CONFIG.DEMO_SLUG;
    let currentNoteId = null;
    let selectedReaction = null;
    let wearerName = '';

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }) + ' · ' + new Date(d).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    }
    function formatShort(d) {
      const diff = Date.now() - new Date(d);
      if (diff < 86400000) return 'Today';
      if (diff < 172800000) return 'Yesterday';
      return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    }
    function initial(name) { return (name || '?').charAt(0).toUpperCase(); }

    async function load() {
      const { data: bracelet, error: bErr } = await db.from('bracelets').select('*').eq('slug', slug).single();
      if (bErr || !bracelet) { showError(); return; }
      wearerName = bracelet.wearer_name;

      const { data: notes } = await db.from('notes').select('*').eq('bracelet_id', bracelet.id).eq('status', 'live').order('created_at', { ascending: false }).limit(4);
      if (!notes || notes.length === 0) { showEmpty(bracelet.wearer_name); return; }

      const current = notes[0];
      const recent = notes.slice(1);
      currentNoteId = current.id;
      render(bracelet, current, recent);

      // Real-time subscription — update when new note published
      db.channel('notes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notes', filter: `bracelet_id=eq.${bracelet.id}` }, payload => {
        if (payload.new.status === 'live') { currentNoteId = payload.new.id; updateNote(payload.new); }
      }).subscribe();
    }

    function updateNote(note) {
      const el = document.getElementById('noteText');
      const from = document.getElementById('noteFrom');
      const date = document.getElementById('noteDate');
      const avatar = document.getElementById('noteAvatar');
      const replyLabel = document.getElementById('replyLabel');
      if (el) el.textContent = note.content;
      if (from) from.textContent = note.author_name;
      if (date) date.textContent = formatDate(note.created_at);
      if (avatar) avatar.textContent = initial(note.author_name);
      if (replyLabel) replyLabel.textContent = `Send ${note.author_name} a quick reply`;
    }

    function render(bracelet, note, recent) {
      const recentHTML = recent.map(n => `
        <div class="archive-item">
          <p class="archive-item-from">${n.author_name}</p>
          <p class="archive-item-preview">${n.content}</p>
          <p class="archive-item-date">${formatShort(n.created_at)}</p>
        </div>`).join('');

      document.getElementById('main').innerHTML = `
        <div class="brand">just <span>because</span></div>
        <div class="tap-ring-container">
          <div class="tap-ring"></div><div class="tap-ring"></div><div class="tap-ring"></div>
          <div class="tap-icon">jb</div>
        </div>
        <div class="note-card">
          <div class="note-header">
            <div class="note-from">
              <span class="note-from-label">A note from</span>
              <span class="note-from-name" id="noteFrom">${note.author_name}</span>
            </div>
            <div class="note-avatar" id="noteAvatar">${initial(note.author_name)}</div>
          </div>
          <div class="note-body">
            <p class="note-text" id="noteText">${note.content}</p>
          </div>
          <div class="note-footer">
            <div class="note-meta">
              <span class="note-date" id="noteDate">${formatDate(note.created_at)}</span>
              <span class="note-bracelet">${bracelet.wearer_name}'s Bracelet</span>
            </div>
            <div class="note-heart">♥</div>
          </div>
        </div>
        <div class="reply-section">
          <div class="reaction-panel" id="reactionPanel">
            <p class="reaction-label" id="replyLabel">Send ${note.author_name} a quick reply</p>
            <div class="reactions">
              <button class="reaction-btn" onclick="selectReaction(this,'❤️','Love')"><span class="reaction-emoji">❤️</span><span class="reaction-name">Love</span></button>
              <button class="reaction-btn" onclick="selectReaction(this,'🤗','Hug')"><span class="reaction-emoji">🤗</span><span class="reaction-name">Hug</span></button>
              <button class="reaction-btn" onclick="selectReaction(this,'😊','Smile')"><span class="reaction-emoji">😊</span><span class="reaction-name">Smile</span></button>
              <button class="reaction-btn" onclick="selectReaction(this,'🙏','Thanks')"><span class="reaction-emoji">🙏</span><span class="reaction-name">Thanks</span></button>
            </div>
          </div>
          <div class="text-reply-panel" id="textPanel">
            <p class="text-reply-label">Add a few words — optional</p>
            <textarea class="text-reply-input" id="replyText" placeholder="I needed this today…" maxlength="200"></textarea>
            <div class="reply-actions">
              <button class="btn-send" onclick="sendReply()">Send reply</button>
              <button class="btn-skip" onclick="sendReply(true)">Just the reaction</button>
            </div>
          </div>
          <div class="sent-confirm" id="sentConfirm">
            <div class="sent-icon">💌</div>
            <p class="sent-title" id="sentTitle">${note.author_name} will feel that.</p>
            <p class="sent-sub">Sent just because.</p>
          </div>
        </div>
        ${recentHTML ? `<div class="archive-strip"><p class="archive-label">Previous notes</p><div class="archive-previews">${recentHTML}</div></div>` : ''}
      `;
    }

    function showEmpty(name) {
      document.getElementById('main').innerHTML = `
        <div class="brand">just <span>because</span></div>
        <div class="error-state"><h2>Nothing yet</h2><p>The people who care about ${name} are working on something. Check back soon.</p></div>`;
    }

    function showError() {
      document.getElementById('main').innerHTML = `
        <div class="brand">just <span>because</span></div>
        <div class="error-state"><h2>Bracelet not found</h2><p>This bracelet hasn't been activated yet.</p></div>`;
    }

    function selectReaction(btn, emoji) {
      document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedReaction = emoji;
      const panel = document.getElementById('textPanel');
      panel.classList.add('visible');
      setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
    }

    async function sendReply(reactionOnly = false) {
      if (!selectedReaction || !currentNoteId) return;
      const message = reactionOnly ? null : (document.getElementById('replyText')?.value || null);
      await db.from('reactions').insert({ note_id: currentNoteId, emoji: selectedReaction, message });
      document.getElementById('reactionPanel').style.display = 'none';
      document.getElementById('textPanel').style.display = 'none';
      const confirm = document.getElementById('sentConfirm');
      const fromName = document.getElementById('noteFrom')?.textContent || 'them';
      document.getElementById('sentTitle').textContent = `${fromName} will feel that.`;
      confirm.classList.add('visible');
    }

    load();
  </script>
</body>
</html>
